<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Waarko Studio</title>
  <link rel="icon" href="Logo2.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05050f;
      --cyan: #00d4ff;
      --blue: #4a9eff;
      --purple: #8b5cf6;
      --glow-cyan: 0 0 20px rgba(0,212,255,0.4);
      --text: #e0e8ff;
      --muted: #6b7a9e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(74,158,255,0.06) 0%, rgba(139,92,246,0.04) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      background: rgba(7,7,26,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,212,255,0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      padding: 16px 40px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    header a {
      font-family: 'Orbitron', monospace;
      font-size: 0.7em;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s, text-shadow 0.3s;
    }

    header a:hover {
      color: var(--cyan);
      text-shadow: var(--glow-cyan);
    }

    .container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
    }

    .logo {
      width: 100px;
      max-width: 30vw;
      margin-bottom: 40px;
      filter: drop-shadow(0 0 20px rgba(74,158,255,0.4));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .error-code {
      font-family: 'Orbitron', monospace;
      font-size: clamp(5em, 20vw, 10em);
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 0%, var(--cyan) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .error-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.6em;
      letter-spacing: 0.5em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .error-message {
      font-size: 1.2em;
      font-weight: 300;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    .btn-primary {
      padding: 14px 36px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-decoration: none;
      border-radius: 4px;
      text-transform: uppercase;
      box-shadow: 0 0 24px rgba(74,158,255,0.3);
      transition: box-shadow 0.3s, transform 0.2s;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.8s forwards;
    }

    .btn-primary:hover {
      box-shadow: 0 0 40px rgba(74,158,255,0.6), 0 0 80px rgba(139,92,246,0.3);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid rgba(0,212,255,0.1);
      padding: 32px 24px;
      text-align: center;
    }

    footer p {
      font-family: 'Orbitron', monospace;
      font-size: 0.6em;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="blog.html">Blog</a>
  </header>

  <div class="container">
    <img src="Logo.png" alt="Waarko Studio" class="logo" />
    <div class="error-code">404</div>
    <p class="error-label">Page Not Found</p>
    <p class="error-message">Looks like this page got lost somewhere in the Bornahead Cinematic Universe. Let's get you back.</p>
    <a href="home.html" class="btn-primary">Back to Home</a>
  </div>

  <footer>
    <p>© 2025–2026 Waarko Studio. All rights reserved.</p>
  </footer>

</body>
</html>
